<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup 2026 Sweepstakes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:#15202b;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:28px 18px;
    background:radial-gradient(ellipse 120% 70% at 50% -10%, rgba(13,148,136,.16) 0%, transparent 55%), #eef2f6}
  .wrap{width:100%;max-width:460px}
  header{text-align:center;margin-bottom:26px}
  .eyebrow{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.3em;text-transform:uppercase;font-size:.7rem;color:#0d9488}
  h1{font-family:'Poppins',sans-serif;font-weight:800;font-size:clamp(2rem,8vw,2.7rem);letter-spacing:-.02em;line-height:1.02;margin:.18em 0 .3em}
  .sub{color:#64748b;font-size:.94rem}
  a.card{display:flex;align-items:center;gap:15px;text-decoration:none;color:inherit;
    background:#fff;border:1px solid #e3e8ef;border-radius:16px;padding:18px 18px;margin-bottom:14px;
    box-shadow:0 1px 3px rgba(15,40,60,.06);transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease}
  a.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(15,40,60,.10);border-color:#cdd6e2}
  .emoji{font-size:2rem;width:54px;height:54px;flex:none;display:grid;place-items:center;border-radius:13px;background:#eef2f7}
  .ctext{flex:1}
  .ctext .t{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.12rem}
  .ctext .d{color:#64748b;font-size:.85rem;margin-top:1px}
  .arr{color:#94a3b8;font-family:'Poppins',sans-serif;font-weight:700;font-size:1.3rem;flex:none}
  footer{text-align:center;color:#94a3b8;font-size:.74rem;margin-top:22px}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">World Cup 2026</div>
      <h1>The Sweepstakes</h1>
      <p class="sub">Pick a leaderboard to follow.</p>
    </header>

    <a class="card" href="family.html">
      <span class="emoji">👨‍👩‍👧‍👦</span>
      <span class="ctext">
        <span class="t">Family Sweepstake</span>
        <span class="d">9 players · group &amp; knockout tracker</span>
      </span>
      <span class="arr">›</span>
    </a>

    <a class="card" href="gym.html">
      <span class="emoji">💪</span>
      <span class="ctext">
        <span class="t">Gym Buddies Sweepstake</span>
        <span class="d">7 players · last-32 knockout &amp; £70 pot</span>
      </span>
      <span class="arr">›</span>
    </a>

    <footer>World Cup 2026 · a bit of fun</footer>
  </div>
</body>
</html>
